<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habitaciones - Aura Travel</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/styles.css?v=1.1" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="header-container"></div>
  <button class="sidebar__toggle" id="sidebarToggle" aria-label="Abrir menú">☰</button>
  <div class="sidebar__overlay" id="sidebarOverlay"></div>

  <main class="main-content" id="mainContent">
    <section class="seccion">
      <div class="container">
        <h2 class="seccion__titulo">Nuestras Habitaciones</h2>
        <p class="seccion__subtitulo">Comodidad y elegancia en cada detalle</p>

        <div class="filtros-header" style="display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 24px;">
          <div class="buscador" style="flex: 1; margin-bottom: 0;">
            <input type="text" id="buscador-input" class="buscador__input" style="width: 100%; max-width: 400px;" placeholder="🔍 Buscar habitación..." />
          </div>
          <button class="btn btn-secundario" id="btn-agregar" style="white-space: nowrap;">+ Nueva Habitación</button>
        </div>

        <div id="mensaje" class="mensaje"></div>
        <div id="habitaciones-container" class="cards-grid">
          <p class="loading">Cargando habitaciones...</p>
        </div>
        <div id="paginacion" class="paginacion" style="display: flex; justify-content: center; gap: 10px; margin-top: 30px;"></div>
      </div>
    </section>
    <div id="footer-container"></div>
  </main>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal auth-form-panel--solo" style="padding: 1.25rem 1.5rem; max-width: 560px;">
      <div class="modal-header" style="border-bottom: 1px solid rgba(43, 108, 176, 0.2); margin-bottom: 0.75rem; padding-bottom: 0.6rem;">
        <h3 class="modal__titulo" id="modal-titulo" style="color: var(--color-texto); margin-bottom: 0; font-size: 1.2rem; font-weight: 700;">Nueva Habitación</h3>
        <button type="button" class="btn-close" id="btn-cerrar-modal" aria-label="Cerrar" style="color: var(--color-texto-claro); font-size: 1.5rem; background: none; border: none; cursor: pointer;">&times;</button>
      </div>
      <form id="form-habitacion" class="form-auth login-premium" style="max-width: 100%;" novalidate>
        <input type="hidden" id="habitacion-id" />

        <div class="form-grid premium-grid" style="gap: 0.6rem;">
          <div class="form-group premium-group" style="grid-column: 1 / -1; margin-bottom: 0;">
            <label for="habitacion-nombre" style="color: var(--color-texto); font-size: 0.78rem; margin-bottom: 0.2rem; font-weight: 600;">Nombre / Tipo <span class="campo-requerido">*</span></label>
            <div class="input-icon-wrapper">
              <i data-lucide="bed" class="input-icon" style="width: 15px; height: 15px;"></i>
              <input type="text" id="habitacion-nombre" placeholder="Ej: Suite Deluxe" style="padding: 0.45rem 0.8rem 0.45rem 2.2rem; font-size: 0.83rem;" />
            </div>
            <span class="error-msg" id="error-habitacion-nombre" style="margin-top: 2px;"></span>
          </div>

          <div class="form-group premium-group" style="margin-bottom: 0;">
            <label for="habitacion-precio" style="color: var(--color-texto); font-size: 0.78rem; margin-bottom: 0.2rem; font-weight: 600;">Precio / noche <span class="campo-requerido">*</span></label>
            <div class="input-icon-wrapper">
              <i data-lucide="dollar-sign" class="input-icon" style="width: 15px; height: 15px;"></i>
              <input type="number" id="habitacion-precio" placeholder="Ej: 150000" min="1" style="padding: 0.45rem 0.8rem 0.45rem 2.2rem; font-size: 0.83rem;" />
            </div>
            <span class="error-msg" id="error-habitacion-precio" style="margin-top: 2px;"></span>
          </div>

          <div class="form-group premium-group" style="margin-bottom: 0;">
            <label for="habitacion-capacidad" style="color: var(--color-texto); font-size: 0.78rem; margin-bottom: 0.2rem; font-weight: 600;">Capacidad personas <span class="campo-requerido">*</span></label>
            <div class="input-icon-wrapper">
              <i data-lucide="users" class="input-icon" style="width: 15px; height: 15px;"></i>
              <input type="number" id="habitacion-capacidad" placeholder="Ej: 2" min="1" style="padding: 0.45rem 0.8rem 0.45rem 2.2rem; font-size: 0.83rem;" />
            </div>
            <span class="error-msg" id="error-habitacion-capacidad" style="margin-top: 2px;"></span>
          </div>

          <div class="form-group premium-group" style="grid-column: 1 / -1; margin-bottom: 0;">
            <label for="habitacion-descripcion" style="color: var(--color-texto); font-size: 0.78rem; margin-bottom: 0.2rem; font-weight: 600;">Descripción <span class="campo-requerido">*</span></label>
            <div class="input-icon-wrapper">
              <i data-lucide="align-left" class="input-icon" style="width: 15px; height: 15px; top: 0.55rem;"></i>
              <textarea id="habitacion-descripcion" rows="2" placeholder="Describe la habitación..." style="width: 100%; padding: 0.45rem 0.8rem 0.45rem 2.2rem; background: #f0f7ff; border: 1.5px solid rgba(43, 108, 176, 0.45); border-radius: 14px; color: var(--color-texto); font-size: 0.83rem; resize: none; outline: none; font-family: inherit;"></textarea>
            </div>
            <span class="error-msg" id="error-habitacion-descripcion" style="margin-top: 2px;"></span>
          </div>

          <div class="form-group premium-group" style="grid-column: 1 / -1; margin-bottom: 0;">
            <label for="habitacion-imagen" style="color: var(--color-texto); font-size: 0.78rem; margin-bottom: 0.2rem; font-weight: 600;">URL de imagen <span class="campo-opcional" style="color: rgba(255,255,255,0.5);">(opcional)</span></label>
            <div class="input-icon-wrapper">
              <i data-lucide="image" class="input-icon" style="width: 15px; height: 15px;"></i>
              <input type="text" id="habitacion-imagen" placeholder="https://ejemplo.com/imagen.jpg" style="padding: 0.45rem 0.8rem 0.45rem 2.2rem; font-size: 0.83rem;" />
            </div>
            <span class="error-msg" id="error-habitacion-imagen" style="margin-top: 2px;"></span>
          </div>
        </div>

        <div id="preview-container" style="display: none; margin-top: 6px; border-radius: 8px; overflow: hidden; border: 1px solid rgba(0, 212, 255, 0.2);">
          <img id="preview-imagen" src="" style="width: 100%; height: 60px; object-fit: cover;">
        </div>

        <div class="modal-actions" style="margin-top: 0.75rem; gap: 0.5rem;">
          <button type="button" class="btn btn-cancelar" id="btn-cancelar" style="background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem 0.9rem; font-size: 0.83rem;">Cancelar</button>
          <button type="submit" class="btn btn-guardar" style="background: linear-gradient(135deg, var(--color-secundario), var(--color-acento)); padding: 0.5rem 0.9rem; font-size: 0.83rem;">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="detalle-modal-overlay" class="modal-overlay" style="display: none; align-items: center; justify-content: center; z-index: 1000;">
    <div class="modal" style="max-width: 550px; padding: 0; overflow: hidden; border-radius: 16px; border: none; background: white; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);">
        <div id="detalle-header" style="height: 180px; position: relative; background: #2563eb; display: flex; align-items: flex-end; padding: 20px;">
            <img id="detalle-img" src="" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.7;">
            <div style="position: relative; z-index: 2;">
                <span id="detalle-categoria" style="background: rgba(255,255,255,0.9); color: #1e40af; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase;">Habitación</span>
                <span id="detalle-estado" style="margin-left: 8px; background: #10b981; color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase;">Activo</span>
                <h3 id="detalle-nombre" style="color: white; font-size: 1.8rem; margin-top: 5px; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Nombre</h3>
            </div>
            <button id="btn-cerrar-detalle" style="position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.3); border: none; color: white; cursor: pointer; border-radius: 50%; width: 32px; height: 32px; font-size: 20px; display: flex; align-items: center; justify-content: center;">&times;</button>
        </div>
        <div style="padding: 24px;">
            <p id="detalle-descripcion" style="color: #4b5563; line-height: 1.6; margin-bottom: 20px; font-size: 1rem;">Descripción...</p>
            <div style="display: flex; gap: 20px; padding: 15px; background: #f3f4f6; border-radius: 12px;">
                <div style="flex: 1;">
                    <span style="display: block; color: #6b7280; font-size: 0.7rem; font-weight: bold; text-transform: uppercase;">Tarifa Noche</span>
                    <span id="detalle-precio" style="color: #111827; font-size: 1.4rem; font-weight: 800;">$0</span>
                </div>
                <div id="detalle-extra" style="flex: 1;">
                    <span style="display: block; color: #6b7280; font-size: 0.7rem; font-weight: bold; text-transform: uppercase;">Capacidad</span>
                    <span id="detalle-capacidad" style="color: #111827; font-size: 1.4rem; font-weight: 800;">—</span>
                </div>
            </div>
            <button type="button" id="btn-entendido" class="btn btn-primario" style="width: 100%; margin-top: 20px; padding: 12px; border-radius: 10px;">Cerrar Vista</button>
        </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
