<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paquetes - Aura Travel</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/styles.css?v=1.1" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="header-container"></div>
  <button class="sidebar__toggle" id="sidebarToggle" aria-label="Abrir menú">☰</button>
  <div class="sidebar__overlay" id="sidebarOverlay"></div>

  <main class="main-content" id="mainContent">
    <section class="seccion">
      <div class="container">
        <h2 class="seccion__titulo">Nuestros Paquetes</h2>
        <p class="seccion__subtitulo">Experiencias únicas para cada viajero</p>

        <div class="filtros-header" style="display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 24px;">
          <div class="buscador" style="flex: 1; margin-bottom: 0;">
            <input type="text" id="buscador-input" class="buscador__input" style="width: 100%; max-width: 400px;" placeholder="🔍 Buscar paquete..." />
          </div>
          <button class="btn btn-secundario" id="btn-agregar" style="white-space: nowrap;">+ Nuevo Paquete</button>
        </div>

        <div id="mensaje" class="mensaje"></div>
        <div id="paquetes-container" class="cards-grid">
          <p class="loading">Cargando paquetes...</p>
        </div>
        <div id="paginacion" class="paginacion" style="display: flex; justify-content: center; gap: 10px; margin-top: 30px;"></div>
      </div>
    </section>
    <div id="footer-container"></div>
  </main>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal__titulo" id="modal-titulo">Nuevo Paquete</h3>
        <button type="button" class="btn-close" id="btn-cerrar-modal" aria-label="Cerrar">&times;</button>
      </div>
      <form id="form-paquete" class="modal-form" novalidate>        <input type="hidden" id="paquete-id" />

        <div class="form-grupo">
          <label>Nombre del Paquete <span class="campo-requerido">*</span></label>
          <input type="text" id="paquete-nombre" placeholder="Ej: Paquete Romántico" />
          <span class="error-msg" id="error-paquete-nombre"></span>
        </div>

        <div class="form-grupo">
          <label>Precio <span class="campo-requerido">*</span></label>
          <input type="number" id="paquete-precio" placeholder="Ej: 500000" min="1" />
          <span class="error-msg" id="error-paquete-precio"></span>
        </div>

        <div class="form-grupo">
          <label>Descripción <span class="campo-requerido">*</span></label>
          <textarea id="paquete-descripcion" rows="4" placeholder="Describe el paquete..."></textarea>          <span class="error-msg" id="error-paquete-descripcion"></span>
        </div>

        <div class="form-grupo">
          <label>URL de imagen <span class="campo-opcional">(opcional)</span></label>
          <input type="text" id="paquete-imagen" placeholder="https://ejemplo.com/imagen.jpg" />
          <span class="error-msg" id="error-paquete-imagen"></span>
        </div>

        <div id="preview-container" style="display: none; margin-bottom: 15px; border-radius: 8px; overflow: hidden; border: 1px solid #ddd;">
          <img id="preview-imagen" src="" style="width: 100%; height: 150px; object-fit: cover;">
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-cancelar" id="btn-cancelar">Cancelar</button>
          <button type="submit" class="btn btn-guardar">Guardar Paquete</button>        </div>
      </form>
    </div>
  </div>

  <div id="detalle-modal-overlay" class="modal-overlay" style="display: none; align-items: center; justify-content: center; z-index: 1000;">
    <div class="modal" style="max-width: 550px; padding: 0; overflow: hidden; border-radius: 16px; border: none; background: white; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);">
        <div id="detalle-header" style="height: 180px; position: relative; background: #7c3aed; display: flex; align-items: flex-end; padding: 20px;">
            <img id="detalle-img" src="" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.7;">
            <div style="position: relative; z-index: 2;">
                <span id="detalle-categoria" style="background: rgba(255,255,255,0.9); color: #5b21b6; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase;">Paquete</span>
                <span id="detalle-estado" style="margin-left: 8px; background: #10b981; color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase;">Activo</span>
                <h3 id="detalle-nombre" style="color: white; font-size: 1.8rem; margin-top: 5px; font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Nombre</h3>
            </div>
            <button id="btn-cerrar-detalle" style="position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.3); border: none; color: white; cursor: pointer; border-radius: 50%; width: 32px; height: 32px; font-size: 20px; display: flex; align-items: center; justify-content: center;">&times;</button>
        </div>
        <div style="padding: 24px;">
            <p id="detalle-descripcion" style="color: #4b5563; line-height: 1.6; margin-bottom: 20px; font-size: 1rem;">Descripción...</p>
            <div style="display: flex; gap: 20px; padding: 15px; background: #f5f3ff; border-radius: 12px; border: 1px solid #ddd6fe;">
                <div style="flex: 1;">
                    <span style="display: block; color: #6d28d9; font-size: 0.7rem; font-weight: bold; text-transform: uppercase;">Inversión</span>
                    <span id="detalle-precio" style="color: #111827; font-size: 1.4rem; font-weight: 800;">$0</span>
                </div>
                <div id="detalle-extra" style="flex: 1;"></div>            </div>
            <button type="button" id="btn-entendido" class="btn btn-primario" style="width: 100%; margin-top: 20px; padding: 12px; border-radius: 10px; background: #7c3aed;">Cerrar Vista</button>
        </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
