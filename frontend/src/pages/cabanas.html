<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabañas - Aura Travel</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/styles.css?v=1.1" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="header-container"></div>
  <button class="sidebar__toggle" id="sidebarToggle" aria-label="Abrir menú">☰</button>
  <div class="sidebar__overlay" id="sidebarOverlay"></div>

  <main class="main-content" id="mainContent">
    <section id="seccion-cabanas" class="seccion">
      <div class="container">
        <div class="section-toolbar">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="buscador-cabanas" placeholder="Buscar por nombre, descripción...">
          </div>
          <div class="toolbar-right">
            <div class="paginacion-resumen" id="paginacion-info-cabanas">Cargando cabañas...</div>
            <button class="btn-nuevo" id="btnNuevaCabana">➕ Nueva Cabaña</button>
          </div>
        </div>

        <div id="lista-cabanas"></div>
        <div class="paginacion" id="paginacion-cabanas"></div>
      </div>
    </section>

    <div id="footer-container"></div>
  </main>

  <div class="modal-overlay" id="modal-cabanas">
    <div class="modal-box auth-form-panel--solo" style="padding: 1.5rem; max-width: 600px;">
      <div class="modal-header" style="border-bottom: 1px solid rgba(0, 212, 255, 0.15); margin-bottom: 1rem; padding-bottom: 0.8rem;">
        <h3 id="cabanas-form-title" style="color: #fff; margin-bottom: 0; font-size: 1.3rem;">➕ Nueva Cabaña</h3>
        <button type="button" class="btn-close" id="btnCerrarModalCabana" aria-label="Cerrar" style="color: #fff; background: transparent; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
      </div>
      <form id="form-cabanas" class="form-auth login-premium" style="max-width: 100%;">
        <input type="hidden" id="cabana-id">
        
        <div class="form-grid premium-grid" style="gap: 0.8rem;">
          <div class="form-group premium-group" style="grid-column: 1 / -1; margin-bottom: 0;">
            <label for="nombreCabana" style="color: #fff; font-size: 0.8rem; margin-bottom: 0.3rem;">🏕️ Nombre de la Cabaña <span class="campo-requerido">*</span></label>
            <div class="input-icon-wrapper">
              <i data-lucide="home" class="input-icon" style="width: 16px; height: 16px;"></i>
              <input type="text" id="nombreCabana" placeholder="Nombre de la cabaña" required style="padding: 0.6rem 1rem 0.6rem 2.5rem; font-size: 0.85rem;">
            </div>
          </div>
          
          <div class="form-group premium-group" style="margin-bottom: 0;">
            <label for="capacidadPersonas" style="color: #fff; font-size: 0.8rem; margin-bottom: 0.3rem;">👥 Capacidad <span class="campo-requerido">*</span></label>
            <div class="input-icon-wrapper">
              <i data-lucide="users" class="input-icon" style="width: 16px; height: 16px;"></i>
              <input type="number" id="capacidadPersonas" placeholder="Capacidad" min="1" style="padding: 0.6rem 1rem 0.6rem 2.5rem; font-size: 0.85rem;">
            </div>
          </div>
          
          <div class="form-group premium-group" style="margin-bottom: 0;">
            <label for="precioNoche" style="color: #fff; font-size: 0.8rem; margin-bottom: 0.3rem;">💰 Precio por Noche <span class="campo-requerido">*</span></label>
            <div class="input-icon-wrapper">
              <i data-lucide="dollar-sign" class="input-icon" style="width: 16px; height: 16px;"></i>
              <input type="number" id="precioNoche" placeholder="Precio por noche" step="0.01" required style="padding: 0.6rem 1rem 0.6rem 2.5rem; font-size: 0.85rem;">
            </div>
          </div>

          <div class="form-group premium-group" style="grid-column: 1 / -1; margin-bottom: 0;">
            <label for="descripcionCabana" style="color: #fff; font-size: 0.8rem; margin-bottom: 0.3rem;">📝 Descripción</label>
            <div class="input-icon-wrapper">
              <i data-lucide="align-left" class="input-icon" style="width: 16px; height: 16px; top: 0.7rem;"></i>
              <textarea id="descripcionCabana" rows="2" placeholder="Descripción de la cabaña" style="width: 100%; padding: 0.6rem 1rem 0.6rem 2.5rem; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 14px; color: #fff; font-size: 0.85rem; resize: none;"></textarea>
            </div>
          </div>
          
          <input type="hidden" id="estadoCabana" value="1">
          
          <div class="form-group premium-group" style="grid-column: 1 / -1; margin-bottom: 0;">
            <label for="imagenCabana" style="color: #fff; font-size: 0.8rem; margin-bottom: 0.3rem;">🖼️ URL de Imagen <span class="campo-opcional" style="color: rgba(255,255,255,0.5);">(opcional)</span></label>
            <div class="input-icon-wrapper">
              <i data-lucide="image" class="input-icon" style="width: 16px; height: 16px;"></i>
              <input type="text" id="imagenCabana" placeholder="https://ejemplo.com/imagen.jpg" style="padding: 0.6rem 1rem 0.6rem 2.5rem; font-size: 0.85rem;">
            </div>
          </div>
        </div>
        
        <div class="modal-actions" style="margin-top: 1rem; gap: 0.5rem;">
          <button type="button" class="btn btn-cancelar" id="btnLimpiarCabana" style="background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 0.6rem 1rem; font-size: 0.85rem;">🔄 Cancelar</button>
          <button type="submit" class="btn-guardar" style="background: linear-gradient(135deg, var(--color-secundario), var(--color-acento)); color: #fff; border: none; padding: 0.6rem 1rem; border-radius: 14px; font-weight: 700; cursor: pointer; font-size: 0.85rem;">💾 Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="modal-ver-cabana">
    <div class="modal-box modal-box-ver">
      <div class="modal-header">
        <h3 id="ver-cabana-titulo">🏕️ Cabaña</h3>
        <button class="modal-close" id="btnCerrarVerCabana">✕</button>
      </div>
      <div class="modal-ver-body">
        <img id="ver-cabana-imagen" src="" alt="Imagen de la cabaña" class="cabana-imagen-preview">
        <div class="ver-cabana-info">
          <p id="ver-cabana-descripcion"></p>
          <div class="ver-cabana-datos">
            <span id="ver-cabana-capacidad"></span>
            <span id="ver-cabana-precio"></span>
            <span id="ver-cabana-estado"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
