<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer Contraseña - Aura Travel</title>
  <link rel="stylesheet" href="/src/css/reset.css" />
  <link rel="stylesheet" href="/src/css/variables.css" />
  <link rel="stylesheet" href="/src/css/styles.css?v=2.2" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div id="header-container"></div>

  <button class="sidebar__toggle" id="sidebarToggle" aria-label="Abrir menú">☰</button>

  <div class="sidebar__overlay" id="sidebarOverlay"></div>

  <main class="main-content" id="mainContent">

    <section class="auth-section">
      <div class="auth-container">
        <!-- Lado de la Imagen -->
        <div class="auth-image-panel">
          <div class="auth-image-content">
            <h1>Nueva <em>Contraseña</em></h1>
            <p>Asegura tu cuenta con una contraseña fuerte y segura.</p>
          </div>
        </div>

        <!-- Lado del Formulario -->
        <div class="auth-form-panel">
          <form id="resetPasswordForm" class="form form-auth login-premium">
            <div class="login-header">
              <div class="login-icon-wrapper" style="width: 54px; height: 54px; margin: 0 auto 1.5rem; background: rgba(49, 130, 206, 0.10); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #3182CE;">
                <i data-lucide="shield-check" style="width: 28px; height: 28px;"></i>
              </div>
              <h2>Restablecer Contraseña</h2>
              <p>Ingresa tu nueva contraseña para volver a entrar a Aura Travel.</p>
            </div>
            
            <div class="form-group premium-group" style="margin-top: 2rem;">
              <label for="newPassword">Nueva Contraseña</label>
              <div class="input-icon-wrapper">
                <i data-lucide="lock" class="input-icon"></i>
                <input type="password" id="newPassword" placeholder="••••••••" required minlength="6">
              </div>
            </div>

            <div class="form-group premium-group">
              <label for="confirmPassword">Confirmar Contraseña</label>
              <div class="input-icon-wrapper">
                <i data-lucide="check-circle-2" class="input-icon"></i>
                <input type="password" id="confirmPassword" placeholder="••••••••" required minlength="6">
              </div>
            </div>

            <p id="errorMessage" style="color: #ef4444; font-size: 0.9rem; text-align: center; margin-bottom: 1rem; display: none;"></p>

            <button type="submit" class="btn btn-primario btn-login" style="margin-top: 1rem;">
              Actualizar Contraseña <i data-lucide="refresh-cw" class="btn-icon"></i>
            </button>
          </form>

          <!-- Mensaje de Éxito -->
          <div id="successMessage" class="login-header" style="display: none; text-align: center;">
            <div class="login-icon-wrapper" style="width: 64px; height: 64px; margin: 0 auto 1.5rem; background: rgba(16, 185, 129, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #10b981;">
              <i data-lucide="check-circle" style="width: 32px; height: 32px;"></i>
            </div>
            <h2>¡Contraseña Actualizada!</h2>
            <p>Tu contraseña ha sido cambiada con éxito. Ya puedes iniciar sesión con tus nuevas credenciales.</p>
            <a href="/src/pages/login.html" class="btn btn-login" style="margin-top: 2rem; display: flex; align-items: center; justify-content: center;">
              Ir al Login <i data-lucide="arrow-right" style="margin-left: 8px; width: 18px;"></i>
            </a>
          </div>
        </div>
      </div>
    </section>

    <div id="footer-container"></div>

  </main>

  <script src="/src/js/api.js"></script>
  <script src="/src/js/app.js"></script>
  <script>
    lucide.createIcons();

    const form = document.getElementById('resetPasswordForm');
    const successMessage = document.getElementById('successMessage');
    const errorEl = document.getElementById('errorMessage');

    // Obtener token de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      errorEl.textContent = 'Token de recuperación no válido o ausente.';
      errorEl.style.display = 'block';
      form.querySelector('button').disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';

      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        errorEl.textContent = 'Las contraseñas no coinciden.';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });

        const data = await response.json();

        if (response.ok) {
          form.style.display = 'none';
          successMessage.style.display = 'block';
          lucide.createIcons();
        } else {
          errorEl.textContent = data.error || 'Ocurrió un error al restablecer la contraseña.';
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = 'Error de conexión con el servidor.';
        errorEl.style.display = 'block';
      }
    });
  </script>

</body>
</html>
