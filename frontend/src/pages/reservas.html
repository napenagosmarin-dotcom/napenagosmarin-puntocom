<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Reservas - Aura Travel</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/styles.css?v=1.1" />
  <link rel="stylesheet" href="../css/nueva-reserva.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    if (!localStorage.getItem('user')) {
      window.location.href = '/src/pages/login.html';
    }
  </script>
</head>
<body class="page-formularios main-content--premium">

  <div id="header-container"></div>

  <button class="sidebar__toggle" id="sidebarToggle" aria-label="Abrir menú">☰</button>

  <div class="sidebar__overlay" id="sidebarOverlay"></div>

  <main class="main-content" id="mainContent">

    <section class="seccion">
      <div class="container" style="max-width: 1300px !important;">
        <div style="text-align: left; margin-bottom: 2rem;">
          <h2>Mis Reservas</h2>
          <p>Gestiona tus reservas de manera fácil y rápida</p>
        </div>
        <div id="reservationsList"></div>
      </div>
    </section>

    <div id="footer-container"></div>

  </main>

  <div id="reservationDetails" class="modal-overlay" style="display:none;">
    <div class="modal-content reservation-details-modal" id="reservationDetailsContent"></div>
  </div>

  <!-- MODAL EDITAR -->
  <div id="editModal" class="modal-overlay" style="display:none;">
    <div class="modal-content modal-content--wide">
      <div class="modal-header">
        <h2>Editar Reserva</h2>
        <button class="btn-close" onclick="cerrarModal()">×</button>
      </div>
      
      <form id="editReservationForm" class="nr-layout">
        
        <!-- Lado Izquierdo: Formulario -->
        <div class="nr-form">
          <div class="nr-grid-2">
            <div class="nr-field">
              <label for="editIDHabitacion">Habitación</label>
              <select id="editIDHabitacion" required>
                <option value="">Seleccione una habitación</option>
              </select>
            </div>
            <div class="nr-field">
              <label for="editIDPaquete">Paquete</label>
              <select id="editIDPaquete" required>
                <option value="">Seleccione un paquete</option>
              </select>
            </div>
          </div>

          <div class="nr-card" style="padding: 1rem;">
            <div class="nr-card__titulo" style="font-size: 0.8rem; margin-bottom: 0.5rem;">Servicios Adicionales</div>
            <div id="editServiciosContainer" class="nr-grid-3" style="gap: 0.5rem;"></div>
          </div>

          <div class="nr-grid-3">
            <div class="nr-field">
              <label for="editFechaInicio">Fecha Inicio</label>
              <input type="date" id="editFechaInicio" required>
            </div>
            <div class="nr-field">
              <label for="editFechaFinalizacion">Fecha Fin</label>
              <input type="date" id="editFechaFinalizacion" required>
            </div>
            <div class="nr-field">
              <label for="editMetodoPago">Pago</label>
              <select id="editMetodoPago" required>
                <option value="">Método de pago</option>
              </select>
            </div>
          </div>

          <div class="actions-row" style="margin-top: 1rem;">
            <button type="button" class="btn btn-primario" onclick="guardarEdicion()">Guardar Cambios</button>
            <button type="button" class="btn btn-outline" onclick="cerrarModal()">Cancelar</button>
          </div>
        </div>

        <!-- Lado Derecho: Resumen -->
        <div class="nr-resumen" id="editResumen">
          <div class="nr-resumen__titulo">Resumen de Pago</div>
          <div class="nr-resumen__fila">
            <span>Subtotal</span>
            <span id="editSubtotal">$0</span>
          </div>
          <div class="nr-resumen__fila">
            <span>IVA (19%)</span>
            <span id="editIva">$0</span>
          </div>
          <div class="nr-resumen__total">
            <span>Total</span>
            <span id="editTotal">$0</span>
          </div>
        </div>

        <input type="hidden" id="editIdReserva">
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="../js/api.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/reservas.js"></script>

</body>
</html>
